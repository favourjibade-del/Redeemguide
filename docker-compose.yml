version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: redeemguide-db
    environment:
      POSTGRES_DB: redeemguide
      POSTGRES_USER: redeemguide_user
      POSTGRES_PASSWORD: redeemguide_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redeemguide_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redeemguide-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  web:
    build: ./backend
    container_name: redeemguide-api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn redeemguide_api.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=redeemguide
      - DATABASE_USER=redeemguide_user
      - DATABASE_PASSWORD=redeemguide_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build: ./backend
    container_name: redeemguide-celery
    command: celery -A redeemguide_api worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=False
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=redeemguide
      - DATABASE_USER=redeemguide_user
      - DATABASE_PASSWORD=redeemguide_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

  # Celery Beat Scheduler
  celery-beat:
    build: ./backend
    container_name: redeemguide-celery-beat
    command: celery -A redeemguide_api beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=False
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=redeemguide
      - DATABASE_USER=redeemguide_user
      - DATABASE_PASSWORD=redeemguide_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: redeemguide-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  default:
    name: redeemguide-network
